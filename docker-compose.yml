services:
  # 1) INIT: install dependencies
  init:
    build: .
    container_name: vue-init
    working_dir: /app
    volumes:
      - .:/app
    command: ["npm", "install"]

  # 2) DEV: run Vite dev server
  dev:
    build: .
    container_name: vue-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_BASE: "/"
      VITE_HOST: "${PUBLIC_HOST}"
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skye-portfolio.rule=Host(`${PUBLIC_HOST}`)"
      - "traefik.http.routers.skye-portfolio.entrypoints=websecure"
      - "traefik.http.routers.skye-portfolio.tls=true"
      - "traefik.http.services.skye-portfolio.loadbalancer.server.port=5173"

  # 3) BUILD: build for GitHub Pages / nginx serve
  build:
    build: .
    container_name: vue-build
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_BASE: "/"
    command: ["sh", "-c", "npm run build"]

  # 4) SERVE: nginx serving the built ./dist over Traefik (production).
  # Run `docker compose run --rm build` first, then `docker compose up -d serve`.
  # NOTE: shares ${PUBLIC_HOST} with the dev service — run one at a time.
  serve:
    image: nginx:alpine
    container_name: vue-serve
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.skye-portfolio-prod.rule=Host(`${PUBLIC_HOST}`)"
      - "traefik.http.routers.skye-portfolio-prod.entrypoints=websecure"
      - "traefik.http.routers.skye-portfolio-prod.tls=true"
      - "traefik.http.services.skye-portfolio-prod.loadbalancer.server.port=80"

networks:
  traefik:
    external: true
